<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>토닥토닥 마음 챙김</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-card">
        <div class="header">
            <div class="emoji-wrapper">🧸</div>
            <h1>토닥토닥 마음 챙김</h1>
            <p class="subtitle">오늘 하루, 어떤 일이 있으셨나요?</p>
        </div>
        
        <div class="input-section">
            <textarea id="userInput" rows="3" placeholder="여기에 마음을 편하게 적어보세요..."></textarea>
            <button id="submitBtn" class="primary-btn">위로 받기 💌</button>
        </div>
        
        <div class="output-section">
            <textarea id="outputMsg" rows="6" readonly placeholder="이곳에 따뜻한 위로의 메시지가 나타납니다."></textarea>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
